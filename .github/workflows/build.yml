# Talos image build pipeline. Builds ISO + metal image + protocore extension OCI,
# signs everything with cosign keyless (GitHub OIDC), generates SBOM via syft.
# Stages 1+ work (real Makefile targets) tracked in plans/monarch-os-talos.md.

name: Build Signed ISO

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v0.1.0). Empty = build only, no release."
        required: false
        type: string

permissions:
  contents: write
  id-token: write   # required for cosign keyless via GitHub OIDC
  packages: write   # for pushing extension OCI to ghcr.io

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Install syft
        uses: anchore/sbom-action/download-syft@v0

      - uses: docker/setup-buildx-action@v3

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build artifacts
        run: |
          # When the Makefile targets land (per plans/monarch-os-talos.md Stage 2):
          #   make iso extension metadata sbom
          # For now this is a no-op so the workflow shape is in place from day one.
          mkdir -p _out
          echo "TODO: wire Makefile targets" > _out/PENDING

      - name: Sign artifacts (cosign keyless)
        if: hashFiles('_out/*.iso') != '' || hashFiles('_out/*.raw') != ''
        env:
          COSIGN_EXPERIMENTAL: "1"
        run: |
          shopt -s nullglob
          for f in _out/*.iso _out/*.raw _out/*.tar; do
            echo "Signing $f"
            cosign sign-blob --yes "$f" --output-signature "$f.sig" --output-certificate "$f.pem"
          done

      - name: Generate SBOM
        if: hashFiles('_out/*.iso') != ''
        run: |
          for iso in _out/*.iso; do
            syft "$iso" -o spdx-json > "${iso%.iso}.sbom.spdx.json"
          done

      - uses: actions/upload-artifact@v4
        with:
          name: talos-image
          path: _out/

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/') || github.event.inputs.tag != ''
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: talos-image
          path: ./_out

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          files: |
            _out/*.iso
            _out/*.raw
            _out/*.sig
            _out/*.pem
            _out/*.sbom.spdx.json
          draft: true
          fail_on_unmatched_files: false
