# --- merged from oracle-genesis-testnet.toml ---
# Testnet oracle genesis manifest — testnet only.
#
# This file is REPLACED at mainnet activation by Nayiem with the
# production-roster authoring. Do not extend on testnet without
# coordination — every entry seeds an authority that the
# decentralized oracle precompile (`0x1009`) trusts to post
# observations.
#
# The runtime expects this section to be inlined into `genesis.toml`
# under the `[oracle]` key (the runtime parses it from there, not from
# this standalone file). This file is the canonical source the
# operator copies into their per-validator `genesis.toml` before
# bootstrapping a fresh testnet.
#
# Owner: foundation 3-of-5 multi-sig at monom16ets48dm0guclykv2hf2z7utnrarlhyw9az7nn
# (20-byte payload 0xd6570a9dbb7a398f92cc55d2a17b8b98fa3fdc8e)
# (per crates/core/runtime/src/config.rs::TESTNET_FOUNDATION_MULTISIG).
#
# Writers: the 5 individual foundation signer addresses derived from
# the same deterministic seed sweep that produces the multisig roster
# (see crates/core/cli/src/commands/testnet.rs::testnet_foundation_signer_address).
# Each member runs as both a signer in the foundation 3-of-5 AND as
# an oracle writer; production rotates this set as third-party writers
# join the foundation roster.
#
# AUD-0047 closure 2026-05-11 — each entry now carries the writer's
# canonical ML-DSA-65 verifying key alongside its address. The runtime
# parser cross-checks `address_from_pubkey(pubkey) == address` so a
# manifest cannot quietly authorise a pubkey that does not match the
# address. Pre-closure the runtime mirrored a single foundation
# placeholder pubkey across every writer; production verify therefore
# returned `false` for every observation.
#
# Reproduction:
#   cargo test -p protocore-runtime --features mdbx --lib \
#     aud0047_print_oracle_writer_entries -- --nocapture --ignored
# Any drift in the printed entries means the seed scheme changed —
# regenerate this file and wipe-and-regenesis the testnet.

[oracle]
admin = "monom16ets48dm0guclykv2hf2z7utnrarlhyw9az7nn"
writers = [
  { address = "mono16v7259qlzuq04zkshhkyulp30gzas8xe7y2uzv", pubkey = "" },
  { address = "mono1kt2ghsr3hupk6q2cw3cy9nvnlmfvexwdyf73fy", pubkey = "" },
  { address = "mono1sxgpf7a9s3jpjz5zepw4glajlrcq5h85amcxns", pubkey = "" },
  { address = "mono1w5gv7sxk8zzcug0ljx05l2n7yme3j69eaecg25", pubkey = "" },
  { address = "mono12cv3rgamlzyraay8rf2y67nu9vxg4gkctn3c2j", pubkey = "" },
]

# --- merged from clob-markets-testnet.toml ---
# Testnet CLOB market-registration manifest — testnet only.
#
# This file is REPLACED at mainnet activation by Nayiem with the
# production market roster. Do not extend on testnet without
# coordination — every entry seeds an explicitly-registered market
# the CLOB precompile (`0x1001`) admits resting orders against.
#
# AUD-0075 — public-profile boots refuse to start when this section
# is empty or any entry has `min_notional_atoms = 0`. The runtime gate
# at `enforce_clob_markets_registered` fires before
# `seed_clob_markets_into_state` writes the registrations, so a
# misauthored manifest hard-fails boot rather than producing a
# silently-wrong CLOB state.
#
# The runtime expects these sections to be inlined into `genesis.toml`
# under the `[clob]` + `[token_factory]` keys (the runtime parses
# them from there, not from this standalone file). This file is the
# canonical source the operator copies into their per-validator
# `genesis.toml` before bootstrapping a fresh testnet.
#
# Token ids are derived from the canonical factory formula:
#   token_id = keccak256(0xFA || creator[20] || creator_nonce_be[8])
# The genesis parser re-derives and rejects any mismatch.
#
# Notional floor rationale (testnet — values picked so a 1-cent dust
# placement reverts but legitimate market-making with sub-LYTH lots
# still admits):
#   LYTH/USDC: 1_000_000_000_000_000_000 quote atoms (1 USDC at
#     18 decimals) — anchors the primary native pair; well-funded
#     market makers ladder above this comfortably.

# Test LYTH (LYTHt) — 8-decimal token mirroring the native LYTH supply
# for CLOB testing. Initial supply minted to the QA wallet so the test
# automation can ladder both sides of the book without a separate
# foundation-funded transfer.
[[token_factory.records]]
token_id      = "0x1bc640e9f21b226d7bb32eabefdcfa08ebcd177937e3c3d945a2806f46b4daa1"
creator       = "monom1jn8gsr53s40lgpy28q7a3zms3taqua0qey0m9m"
creator_nonce = 0
owner         = "mono1dws5m2r5em9zm526u8yun52ud2pv7nchpx0q2g"
name          = "Lyth Testnet"
symbol        = "LYTHt"
decimals      = 8
initial_supply = "10000000000000000"
max_supply    = "0"
flags         = 0

# Test USDC (USDCt) — 18-decimal stablecoin shim for the test pair.
# Initial supply 10M USDC at 18 decimals = 1e25 atoms.
[[token_factory.records]]
token_id      = "0xb067b3bccc8cd353753b36b3859bde1a230be94818492bb5a54a48ac9f2d64f0"
creator       = "monom1jn8gsr53s40lgpy28q7a3zms3taqua0qey0m9m"
creator_nonce = 1
owner         = "mono1dws5m2r5em9zm526u8yun52ud2pv7nchpx0q2g"
name          = "USDC Testnet"
symbol        = "USDCt"
decimals      = 18
initial_supply = "10000000000000000000000000"
max_supply    = "0"
flags         = 0

[[clob.markets]]
# LYTHt / USDCt market — primary CLOB testing pair, references the
# factory-token ids declared above.
base = "0x1bc640e9f21b226d7bb32eabefdcfa08ebcd177937e3c3d945a2806f46b4daa1"
quote = "0xb067b3bccc8cd353753b36b3859bde1a230be94818492bb5a54a48ac9f2d64f0"
min_notional_atoms = "1000000000000000000"

# --- merged from commerce-genesis-testnet.toml ---
# Testnet agent-commerce economics manifest — testnet only.
#
# This file is REPLACED at mainnet activation by Nayiem with the
# production economics. Do not extend on testnet without coordination
# — every entry seeds a precompile-side parameter that downstream
# applications (issuer / discovery / arbiter consumers) depend on.
#
# The runtime expects this section to be inlined into `genesis.toml`
# under the `[commerce]` key (the runtime parses it from there, not
# from this standalone file). This file is the canonical source the
# operator copies into their per-validator `genesis.toml` before
# bootstrapping a fresh testnet.
#
# Slash authority (issuer + arbiter): foundation 3-of-5 multi-sig at
# monom16ets48dm0guclykv2hf2z7utnrarlhyw9az7nn
# (20-byte payload 0xd6570a9dbb7a398f92cc55d2a17b8b98fa3fdc8e)
# (per crates/core/runtime/src/config.rs::TESTNET_FOUNDATION_MULTISIG).
# Discovery is anti-spam, not slashable, so it carries only `min_bond_lythoshi`.
#
# Bond sizing rationale (testnet — values are small enough to keep
# fixture funding reasonable, large enough to make spam an actual
# expense; mainnet rotates these against a foundation policy review):
#   issuer:    1 LYTH  (100_000_000 lythoshi)   — KYC providers, review aggregators
#   discovery: 0.1 LYTH (10_000_000 lythoshi)   — listing spam deterrent only
#   arbiter:  10 LYTH  (1_000_000_000 lythoshi) — dispute decisions carry the most
#                                                blast radius, highest bond
#
# Unbond delay rationale (testnet wall-clock-equivalent seconds, sourced
# from PrecompileCtx::block_timestamp per AUD-0067/0052):
#   issuer:   ~5 days   (432_000 s) — short enough for testnet rotation
#   arbiter: ~15 days (1_296_000 s) — longest cool-down before a slashed
#                                     arbiter walks away with their bond

[commerce.issuer]
min_bond_lythoshi = "100000000"
unbond_delay_blocks = 432000
slash_authority = "monom16ets48dm0guclykv2hf2z7utnrarlhyw9az7nn"

[commerce.discovery]
min_bond_lythoshi = "10000000"

[commerce.arbiter]
min_bond_lythoshi = "1000000000"
unbond_delay_blocks = 1296000
slash_authority = "monom16ets48dm0guclykv2hf2z7utnrarlhyw9az7nn"
