# Monolythium Testnet (chain-69420) — canonical milestone config
#
# THIS IS THE CANONICAL, UNSIGNED milestone configuration for testnet-69420.
# It is plain config: a [meta] header (chain id + a config id/version) and one
# or more [[entries]], each activating a set of protocol parameters / precompile
# gates at a given block height. The chain loads this file as configuration; it
# does NOT verify any in-file milestone signature. The dropped on-chain signature
# apparatus ([meta].signers / threshold / signer_set_id and the [[signatures]]
# blocks) is intentionally absent here.
#
# AUTHENTICITY (supply-chain, not on-chain):
#   Authenticity of this file is provided by the cosign signature committed
#   beside it — `testnet-69420.milestones.toml.sig` + `.pem` (and `.sha256`),
#   produced by the `.github/workflows/milestones-attestation.yml` keyless-OIDC
#   cosign CI. Operators MUST verify before deploy, e.g.:
#
#     cosign verify-blob \
#       --certificate      testnet-69420.milestones.toml.pem \
#       --signature        testnet-69420.milestones.toml.sig \
#       --certificate-identity-regexp \
#         'https://github.com/monolythium/chain-registry/\.github/workflows/milestones-attestation\.yml@.*' \
#       --certificate-oidc-issuer 'https://token.actions.githubusercontent.com' \
#       testnet-69420.milestones.toml
#
#   This is exactly the same GitHub-authenticity model the registry already uses
#   for `genesis_url` (the committed genesis content) and for the cosigned
#   protocore release the operator binary is built from.
#
# ON-CHAIN BINDING:
#   The genesis bundle pins this config's canonical `milestone_digest`. A node
#   loading these milestones recomputes that digest and requires it to match the
#   genesis pin before applying any entry, so the content a node runs is bound to
#   the genesis it booted — the digest is the on-chain anchor, the cosign blob is
#   the supply-chain anchor, and there is no in-file signature to verify.
#
# ROLLING UPGRADE:
#   To change protocol parameters without a re-genesis: append/edit an [[entries]]
#   block with a future activation `height`, push to master (CI re-cosigns), then
#   operators `cosign verify-blob` the new file, deploy it, and roll the fleet
#   BEFORE the new activation height. See README.md "Milestones".

