# --- Rolling upgrade: F-INF-047 / issue #58 -------------------------------
# Byzantine block.timestamp wall-clock clamp. Targeted to height 2000 on the
# v0.3.0 lifecycle-active re-genesis chain (genesis 0xdc0ff48…, binary v0.3.0
# 653347db…), a comfortable buffer above the chain's early height. Below 2000
# every node folds this entry as None (rule OFF, legacy timestamp formula) and
# is byte-identical to the pre-edit baseline; at height >= 2000 every node
# enforces the deterministic round-anchored timestamp window (rejecting any
# proposer, honest or Byzantine, outside [floor, floor + 1h]). Field value ==
# height per the in-tree activation contract:
#   effective_at(h).block_timestamp_wall_clock_height.is_some_and(|a| h >= a)
[[entries]]
id = "activate-58-block-timestamp-wallclock"
height = 2000
block_timestamp_wall_clock_height = 2000

# --- Open-seat marketplace primitive (#147, audit-fixed) ----------------------
# Activates the five node-registry (0x1005) open-seat selectors
# (advertiseSeat/applyForSeat/voteSeatAdmit/withdrawSeatApplication/closeSeat)
# at height 4000 on the v0.3.0 lifecycle-active re-genesis chain. The fleet runs
# binary v0.3.0 (sha 653347db…, which carries the gated selectors WITH the audit
# fixes #150/#152/#153 — applyForSeat escrows the full self-bond, voteClusterAdmit
# rejects seat applications, closeSeat enforces advertiser ownership). Below 4000
# every binary folds this entry as None and the selectors resolve to
# UnknownSelector (byte-identical to the predecessor) — no fork during the staged
# roll. At height >= 4000 the binary activates the (fixed) selectors. Field value
# == height per the in-tree activation contract:
#   effective_at(h).open_seat_market_height.is_some_and(|a| h >= a)
[[entries]]
id = "activate-open-seat-marketplace"
height = 4000
open_seat_market_height = 4000
