# --- Rolling upgrade: F-INF-047 / issue #58 -------------------------------
# Byzantine block.timestamp wall-clock clamp. Re-targeted to height 83000 — a
# ~4h buffer above the ~76.4k live height at this revision (was 200000), to
# bring the clamp into force sooner now that the rolling-config mechanism is
# proven. The fleet rolls this config one node at a time, well before
# activation. Below 83000 every node folds this entry as None (rule OFF, legacy
# timestamp formula) and is byte-identical to the pre-edit baseline; at height
# >= 83000 every node enforces the deterministic round-anchored timestamp
# window (rejecting any proposer, honest or Byzantine, outside [floor,
# floor + 1h]). Field value == height per the in-tree activation contract:
#   effective_at(h).block_timestamp_wall_clock_height.is_some_and(|a| h >= a)
[[entries]]
id = "activate-58-block-timestamp-wallclock"
height = 83000
block_timestamp_wall_clock_height = 83000

# --- Cassette upgrade: open-seat marketplace primitive (#147, audit-fixed) ----
# Activates the five node-registry (0x1005) open-seat selectors
# (advertiseSeat/applyForSeat/voteSeatAdmit/withdrawSeatApplication/closeSeat)
# at height 87500. The fleet runs the corrected v0.2.3 binary B (sha
# 8fcbaaa2…, which carries the gated selectors WITH the audit fixes #150/#152/
# #153 — applyForSeat escrows the full self-bond, voteClusterAdmit rejects seat
# applications, closeSeat enforces advertiser ownership). Below 87500 every
# binary folds this entry as None and the selectors resolve to UnknownSelector
# (byte-identical to the predecessor) — no fork during the staged roll. At
# height >= 87500 binary B activates the (fixed) selectors. Field value ==
# height per the in-tree activation contract:
#   effective_at(h).open_seat_market_height.is_some_and(|a| h >= a)
[[entries]]
id = "activate-open-seat-marketplace"
height = 87500
open_seat_market_height = 87500
